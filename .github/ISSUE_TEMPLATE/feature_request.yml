name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why does this matter?
      description: How would this help you or your team?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Change detection / severity
        - Card layout / formatting
        - Bot commands
        - Deployment / setup
        - Other
